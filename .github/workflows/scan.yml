# ─────────────────────────────────────────────────────────────────
# Sensitive-Content Scanner (Defense Line 3)
#
# 在 push / PR 时扫描整个仓库, 拦截以下泄露:
#   - RFC1918 私网 IP (192.168.* / 10.* / 172.16-31.*)
#   - SSH 私钥 PEM (BEGIN ... PRIVATE KEY)
#   - 各家 API token 模式 (AKIA... / sk-... / ghp_... / ya29....)
#   - 强 40+ 字符 hex 看似 token 的串
#   - 已知敏感主机名 (从 .scan-internal-keywords 文件读, gitignore'd)
#
# 失败策略: 任何匹配 → workflow 失败, PR 不能合并, push 显示红 X.
#
# 想本地预跑同样的扫描:
#   bash scripts/scan-sensitive.sh
# ─────────────────────────────────────────────────────────────────

name: Sensitive content scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Scan for leaked secrets / private IPs / SSH keys
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan RFC1918 private IPs
        run: |
          echo "── Scanning for RFC1918 private IPs ──"
          # 排除 .git, node_modules, .github/workflows (本文件含 "192.168" 字面量解释)
          if grep -rEn '(\b192\.168\.[0-9]{1,3}\.[0-9]{1,3}\b|\b10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\b|\b172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3}\b)' \
              --include='*.md' --include='*.sh' --include='*.ts' --include='*.tsx' \
              --include='*.js' --include='*.jsx' --include='*.json' --include='*.yml' \
              --include='*.yaml' --include='*.sql' --include='*.env*' \
              --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.next \
              --exclude-dir=dist --exclude-dir=.github \
              .; then
            echo "::error::Found RFC1918 private IP in repository — REJECT push"
            exit 1
          fi
          echo "✓ No private IPs"

      - name: Scan SSH private keys
        run: |
          echo "── Scanning for SSH/PGP private key headers ──"
          if grep -rEn '\-{5}BEGIN ([A-Z]+ )?PRIVATE KEY\-{5}' \
              --exclude-dir=.git --exclude-dir=node_modules \
              .; then
            echo "::error::Found PRIVATE KEY block — REJECT push"
            exit 1
          fi
          echo "✓ No private keys"

      - name: Scan known API token patterns
        run: |
          echo "── Scanning for known token shapes ──"
          # AWS access key (AKIA...), Slack token (xox[bap]-...), GitHub token (ghp_/gho_/ghs_),
          # OpenAI (sk-...), Google API key (ya29.../AIza...)
          if grep -rEn '(\bAKIA[0-9A-Z]{16}\b|\bxox[baprs]-[A-Za-z0-9-]{10,}\b|\b(ghp|gho|ghs|ghu|ghr)_[A-Za-z0-9]{36,}\b|\bsk-[A-Za-z0-9]{32,}\b|\b(ya29|AIza)\.?[A-Za-z0-9_-]{20,}\b)' \
              --include='*.md' --include='*.sh' --include='*.ts' --include='*.tsx' \
              --include='*.js' --include='*.jsx' --include='*.json' --include='*.yml' \
              --include='*.yaml' --include='*.env*' \
              --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.next \
              --exclude-dir=dist --exclude-dir=.github \
              .; then
            echo "::error::Found known token pattern — REJECT push"
            exit 1
          fi
          echo "✓ No token shapes"

      - name: Scan committer email / author (must be aipo@*)
        run: |
          echo "── Scanning recent commit authors ──"
          # 防 fork PR 用别的身份带敏感信息进来 — 至少 commit 不能挂"Claude"/"lenshow"等 author
          BAD_AUTHORS=$(git log --pretty=format:'%ae%n%ce' -50 | sort -u | \
            grep -iE '(noreply\.anthropic\.com|users\.noreply\.github\.com.*lenshow)' || true)
          if [ -n "$BAD_AUTHORS" ]; then
            echo "::warning::Found commits authored under non-AiPo identity:"
            echo "$BAD_AUTHORS"
            # Warning only — don't fail (external PRs use their own emails, OK)
          fi
          echo "✓ Author scan completed"
